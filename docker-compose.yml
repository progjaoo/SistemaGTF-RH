services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-rh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_rh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_rh"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sistema_rh_pg16data:/var/lib/postgresql/data

volumes:
  sistema_rh_pg16data: